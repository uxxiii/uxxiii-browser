name: Deploy website to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show `website` files
        run: ls -la website || echo "website directory not found"

      - name: Copy logo into website
        run: |
          LOG_SRC="logo/logo without bg.png"
          LOG_DST="website/logo-without-bg.png"
          if [ -f "$LOG_SRC" ]; then
            echo "Copying logo to website folder"
            cp "$LOG_SRC" "$LOG_DST"
          else
            echo "No logo file found at $LOG_SRC"
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
